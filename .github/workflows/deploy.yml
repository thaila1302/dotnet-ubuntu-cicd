name: .NET Core CI/CD

on:
  push:
    branches: [ "main", "develop" ] # Theo dõi cả 2 nhánh

jobs:
  build-and-deploy:
    runs-on: self-hosted          
    
    steps:
    - uses: actions/checkout@v4

    - name: Publish Application
      run: dotnet publish ./MyApiApp/MyApiApp.csproj -c Release -o ./MyApiApp/publish

    # --- NHÁNH DEVELOP: Deploy lên cổng 5001 ---
    - name: Deploy to Staging (Develop)
      if: github.ref == 'refs/heads/develop'
      env:
        RUNNER_TRACK_PROCESSES: false
      run: |
        # Kill process cũ trên port 5001
        fuser -k 5001/tcp || true
        cd ./MyApiApp/publish
        nohup dotnet MyApiApp.dll --urls "http://0.0.0.0:5001" > staging.log 2>&1 &

    # --- NHÁNH MAIN: Deploy lên cổng 5000 ---
    - name: Deploy to Production (Main)
      if: github.ref == 'refs/heads/main'
      env:
        RUNNER_TRACK_PROCESSES: false
      run: |
        # Kill process cũ trên port 5000
        fuser -k 5000/tcp || true
        cd ./MyApiApp/publish
        nohup dotnet MyApiApp.dll --urls "http://0.0.0.0:5000" > production.log 2>&1 &